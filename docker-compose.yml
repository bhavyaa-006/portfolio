version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./portfolio.db
      - BACKEND_CORS_ORIGINS=["http://localhost:5173", "http://localhost:8000"]
      - SECRET_KEY=development-secret-key-do-not-use-in-prod

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
